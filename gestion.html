<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Maestro - Gestión Cancionero</title>
  
  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
  
  <!-- Fuentes e Iconos -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  
  <!-- Estilos del Editor -->
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>

  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-card">
      <img src="https://javo19hsmi.github.io/cancionero-link/assets/images/Logo_Ministerio_Musica.png" height="100" style="margin-bottom:20px" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2662/2662361.png'">
      <h2 style="margin:0">Portal Maestro</h2>
      <p style="color:#666; font-size:13px">Gestión Parroquial Unificada</p>
      <br><br>
      <button class="btn btn-save" id="login-trigger" style="width:100%; display:flex; align-items:center; justify-content:center; gap:10px">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
        Entrar con Google
      </button>
    </div>
  </div>

  <!-- App Principal -->
  <div id="app" class="app-container">
    <header>
      <div style="display:flex; align-items:center; gap:12px">
        <span class="material-symbols-outlined" style="color:var(--primary)">verified_user</span>
        <b style="font-size:14px; letter-spacing:1px">PORTAL MAESTRO</b>
      </div>
      
      <!-- PESTAÑAS DINÁMICAS + BOTÓN PUBLICAR -->
      <div style="display:flex; gap:25px; align-items:center">
        <div id="nav-tabs" style="display:flex; gap:20px">
           <button id="tab-songs" class="tab-btn active" onclick="switchMod('songs')">🎵 CANCIONERO</button>
           <button id="tab-announcements" class="tab-btn" onclick="switchMod('announcements')">📢 ANUNCIOS</button>
           <button id="tab-prayers" class="tab-btn" onclick="switchMod('prayers')">🙏 ORACIONES</button>
           <button id="tab-scripts" class="tab-btn" onclick="switchMod('scripts')">📜 GUIONES</button>
        </div>
        <button id="global-pub-btn" class="btn btn-publish" style="display:none; padding:8px 20px; font-size:11px" onclick="confirmPublish()">🚀 SUBIR VERSIÓN PÚBLICA</button>
        <div style="border-left:1px solid var(--glass-border); height:25px"></div>
        <span id="header-email" style="font-size:11px; color:#666"></span>
        <button class="btn" onclick="logout()" style="padding:5px 15px; font-size:10px; background:rgba(255,255,255,0.05)">SALIR</button>
      </div>
    </header>

    <!-- Módulo: Cancionero -->
    <main id="mod-songs" class="main-grid">
      <!-- PANEL BUSCADOR -->
      <section class="glass-panel">
        <label>BUSCAR CANCIÓN</label>
        <input type="text" id="song-search-box" placeholder="Título o frase..." oninput="filterSongs()">
        <div id="song-results-list" class="search-results"></div>
      </section>

      <!-- PANEL EDITOR -->
      <section class="glass-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <label id="mode-text">MODO ACORDES</label>
          <button id="pencil-btn" class="btn" style="background:none; color:#555; padding:0; display:none" onclick="toggleEditMode()">
            <span class="material-symbols-outlined" style="font-size:20px">edit</span>
          </button>
        </div>
        <textarea id="lyrics-editor" spellcheck="false" readonly placeholder="Elegí una canción..."></textarea>
        
        <div class="manual-chord-box">
          <label>INSERCIÓN AVANZADA (9, sus4, add...)</label>
          <div style="display:flex; gap:10px">
            <input type="text" id="manual-chord-in" style="margin:0; flex:1; text-align:center" placeholder="Ej: Sib9">
            <button class="btn btn-save" onclick="insManual()">INSERTAR</button>
          </div>
        </div>
        <!-- AYUDA MEMORIA -->
        <div style="margin-top:10px; font-size:9px; color:#555; text-align:center">
          D=Do | R=Re | M=Mi | F=Fa | S=Sol | L=La | I=Si | -=menor | #=# | B=bmol
        </div>
      </section>

      <!-- PANEL DATOS -->
      <section class="glass-panel">
        <label>METADATOS</label>
        <input type="text" id="m-title-in" readonly>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
          <div class="form-group"><label>TONO</label><select id="m-key-sel"></select></div>
          <div class="form-group"><label>RITMO</label><input type="text" id="m-rhythm-in"></div>
        </div>
        <label>AUTOR</label><input type="text" id="m-artist-in">
        <label>AUDIO LINK</label><input type="text" id="m-audio-in">
        <button class="btn btn-save" style="width:100%; margin-top:10px" onclick="saveBorrador()">GUARDAR BORRADOR 💾</button>
        <hr style="border:0; border-top:1px solid var(--glass-border); margin:15px 0">
        <label>VISTA PREVIA FIEL</label>
        <div id="preview-box" style="background:white; color:#222; border-radius:12px; padding:15px; font-size:14px; line-height:2; overflow-y:auto; flex:1"></div>
      </section>
    </main>

    <!-- OTROS MÓDULOS -->
    <main id="mod-announcements" class="main-grid" style="display:none"><div class="glass-panel" style="grid-column: span 3"><h2>📢 Anuncios</h2><p>En construcción...</p></div></main>
    <main id="mod-prayers" class="main-grid" style="display:none"><div class="glass-panel" style="grid-column: span 3"><h2>🙏 Oraciones</h2><p>En construcción...</p></div></main>
    <main id="mod-scripts" class="main-grid" style="display:none"><div class="glass-panel" style="grid-column: span 3"><h2>📜 Guiones</h2><p>En construcción...</p></div></main>
  </div>

  <!-- Busy Overlay -->
  <div id="busy-overlay">
    <div class="glass" style="padding:30px; border-radius:20px; text-align:center">
      <div style="border:3px solid var(--primary); border-top-color:transparent; width:30px; height:30px; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 15px"></div>
      <b id="busy-text">Cargando...</b>
    </div>
  </div>

  <!-- Scripts modulares -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/editor.js"></script>

</body>
</html>
