<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Edición - Gestión Parroquial</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>

  <!-- PANTALLA DE INGRESO -->
  <div id="login-overlay">
    <div class="login-card">
      <img src="https://javo19hsmi.github.io/cancionero-link/assets/images/Logo_Ministerio_Musica.png" height="100" style="margin-bottom:20px" alt="Logo">
      <h2 style="margin:0">Portal de Edición</h2>
      <p style="color:#666; font-size:13px">Gestión Parroquial Unificada</p><br><br>
      <button class="btn btn-save" id="login-trigger" style="width:100%; display:flex; align-items:center; justify-content:center; gap:10px">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16" alt="Google"> Entrar con Google
      </button>
    </div>
  </div>

  <div id="app" class="app-container">
    <!-- BARRA SUPERIOR -->
    <header style="flex-direction: column; padding: 0;">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 25px; border-bottom: 1px solid var(--glass-border); box-sizing: border-box;">
        <div style="display:flex; align-items:center; gap:12px">
          <span class="material-symbols-outlined" style="color:var(--primary)">verified_user</span>
          <b style="font-size:14px; letter-spacing:1px">PORTAL DE EDICIÓN</b>
        </div>
        <div style="display:flex; gap:15px; align-items:center">
          <span id="header-email" style="font-size:11px; color:#666"></span>
          <button class="btn" onclick="logout()" style="padding:5px 15px; font-size:10px; background:rgba(255,255,255,0.05)">SALIR</button>
        </div>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 25px; box-sizing: border-box; background: rgba(0,0,0,0.2);">
        <div id="nav-tabs" style="display:flex; gap:20px">
           <button id="tab-songs" class="tab-btn active" onclick="switchMod('songs')">🎵 CANCIONERO</button>
           <button id="tab-announcements" class="tab-btn" onclick="switchMod('announcements')">📢 ANUNCIOS</button>
           <button id="tab-prayers" class="tab-btn" onclick="switchMod('prayers')">🙏 ORACIONES</button>
           <button id="tab-scripts" class="tab-btn" onclick="switchMod('scripts')">📜 GUIONES</button>
        </div>
        <button id="global-pub-btn" class="btn btn-publish" style="display:none; padding:8px 20px; font-size:11px; margin: 5px 0;" onclick="confirmPublish()">🚀 SUBIR VERSIÓN PÚBLICA</button>
      </div>
    </header>

    <main id="mod-songs" class="main-grid">
      <!-- COLUMNA 1: BUSCADOR -->
      <section class="glass-panel">
        <label>BUSCAR CANCIÓN</label>
        <input type="text" id="song-search-box" placeholder="Título o frase..." oninput="filterSongs()">
        <div id="song-results-list" class="search-results"></div>
      </section>

      <!-- COLUMNA 2: EDITOR VISUAL -->
      <section class="glass-panel" style="overflow-y: auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <label id="mode-text">MODO ACORDES</label>
          <div style="display:flex; gap:8px;">
            <button id="toggleAcordesBtn" class="btn" style="padding:5px 10px; font-size:11px; background: rgba(255,255,255,0.05); color: var(--text);" onclick="toggleAcordes()">Ocultar Teclado</button>
            <button id="pencil-btn" class="btn" style="background:none; color:#555; padding:0; display:none" onclick="toggleEditMode()" title="Lápiz Maestro">
              <span class="material-symbols-outlined" style="font-size:20px">edit</span>
            </button>
          </div>
        </div>
        
        <div style="display:flex; gap:15px; align-items: flex-start;">
          <div id="lyrics-editor" contenteditable="true" spellcheck="false" placeholder="Elegí una canción para empezar a editar..." oninput="markUnsavedChanges()"></div>
          
          <div id="acordesCol" style="width: 220px; flex-shrink: 0;">
             <div class="kbd">
               <label style="text-align:center;">Acordes Rápidos</label>
               <div class="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                 <div class="key" onclick="insMob('Do')">Do</div><div class="key" onclick="insMob('Re')">Re</div>
                 <div class="key" onclick="insMob('Mi')">Mi</div><div class="key" onclick="insMob('Fa')">Fa</div>
                 <div class="key" onclick="insMob('Sol')">Sol</div><div class="key" onclick="insMob('La')">La</div>
                 <div class="key" style="grid-column: span 2;" onclick="insMob('Si')">Si</div>
               </div>
               <label style="text-align:center; margin-top:10px;">Modificadores</label>
               <div class="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                 <div class="key" onclick="modMob('#')">#</div><div class="key" onclick="modMob('b')">b</div>
                 <div class="key" onclick="modMob('m')">m</div><div class="key" onclick="modMob('7')">7</div>
               </div>
               <div class="key" style="margin-top:10px; text-align:center; background:rgba(255,82,82,0.1); color:var(--danger); border-color:var(--danger);" onclick="delMob()">Borrar Acorde</div>
             </div>

             <div class="manual-chord-box" style="margin-top: 15px; background: rgba(77, 182, 172, 0.05); border: 1px dashed var(--primary); border-radius: 12px; padding: 12px;">
               <label style="text-align: center;">Acorde Manual (Ej: Dosus9)</label>
               <input type="text" id="manual-chord-in" placeholder="Escribí acá..." style="text-align:center; margin-bottom: 8px;">
               <button class="btn btn-save" style="width:100%; font-size:11px;" onclick="insManual()">INSERTAR</button>
             </div>
          </div>
        </div>
      </section>

      <!-- COLUMNA 3: METADATOS COMPLETOS (RESTAURADA) -->
      <section class="glass-panel" style="overflow-y: auto;">
        <label>TÍTULO</label>
        <input type="text" id="m-title-in" readonly oninput="markUnsavedChanges()">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
          <div class="form-group"><label>TONO</label><select id="m-key-sel" onchange="markUnsavedChanges()"></select></div>
          <div class="form-group"><label>RITMO</label><input type="text" id="m-rhythm-in" oninput="markUnsavedChanges()"></div>
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
          <div class="form-group"><label>AUTOR / ARTISTA</label><input type="text" id="m-artist-in" oninput="markUnsavedChanges()"></div>
          <div class="form-group"><label>ÁLBUM</label><input type="text" id="m-album-in" oninput="markUnsavedChanges()"></div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
          <div class="form-group"><label>AÑO</label><input type="number" id="m-year-in" oninput="markUnsavedChanges()"></div>
          <div class="form-group"><label>COPYRIGHT</label><input type="text" id="m-copyright-in" oninput="markUnsavedChanges()"></div>
        </div>

        <label>BIOGRAFÍA / RESEÑA</label>
        <textarea id="m-biography-in" rows="2" style="background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 8px; padding: 8px; color: white; font-size: 13px; margin-bottom: 10px; width: 100%; box-sizing: border-box; resize: none;" oninput="markUnsavedChanges()"></textarea>

        <label>MOMENTOS LITÚRGICOS</label>
        <div id="moments-container" style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px;"></div>

        <label>PARTITURA (LINK O SUBIR PDF)</label>
        <div style="display: flex; gap: 5px;">
          <input type="text" id="m-sheet-in" placeholder="Link de partitura..." oninput="markUnsavedChanges()" style="flex:1;">
          <button class="btn btn-save" onclick="document.getElementById('fileInputSheet').click()" style="padding: 5px 10px;" title="Subir a Storage">📁</button>
        </div>
        <input type="file" id="fileInputSheet" accept=".pdf,image/*" style="display:none" onchange="uploadFile(this, 'partituras', 'm-sheet-in')">

        <label>AUDIO LINK O SUBIR MP3</label>
        <div style="display: flex; gap: 5px;">
          <input type="text" id="m-audio-in" placeholder="Link de audio..." oninput="updateAudioPreview(); markUnsavedChanges();" style="flex:1;">
          <button class="btn btn-save" onclick="document.getElementById('fileInputAudio').click()" style="padding: 5px 10px;" title="Subir a Storage">📁</button>
        </div>
        <input type="file" id="fileInputAudio" accept="audio/*" style="display:none" onchange="uploadFile(this, 'audios', 'm-audio-in')">
        <small id="uploadStatus" style="color: var(--primary); display: block; margin-bottom: 10px;"></small>

        <div id="audioPreviewContainer" style="display: none; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px;">
          <label style="font-size: 10px;">VISTA PREVIA</label>
          <div id="playerWrapper"></div>
        </div>

        <button class="btn btn-save" style="width:100%; margin-top:auto" onclick="saveBorrador()">GUARDAR CAMBIOS 💾</button>
      </section>
    </main>

    <!-- MÓDULOS EN CONSTRUCCIÓN -->
    <main id="mod-announcements" class="main-grid" style="display:none;"><section class="glass-panel"><h2 style="text-align:center;">📢 Anuncios</h2></section></main>
    <main id="mod-prayers" class="main-grid" style="display:none;"><section class="glass-panel"><h2 style="text-align:center;">🙏 Oraciones</h2></section></main>
    <main id="mod-scripts" class="main-grid" style="display:none;"><section class="glass-panel"><h2 style="text-align:center;">📜 Guiones</h2></section></main>
  </div>

  <!-- TECLADO MÓVIL (OCULTO EN PC) -->
  <div id="mobileChordBar">
    <button class="close-mobile-btn" onclick="document.getElementById('mobileChordBar').style.display='none'">X</button>
    <div class="mb-row">
      <div class="mb-btn btn-root" onclick="insMob('Do')">Do</div>
      <div class="mb-btn btn-root" onclick="insMob('Re')">Re</div>
      <div class="mb-btn btn-root" onclick="insMob('Mi')">Mi</div>
      <div class="mb-btn btn-root" onclick="insMob('Fa')">Fa</div>
      <div class="mb-btn btn-root" onclick="insMob('Sol')">Sol</div>
      <div class="mb-btn btn-root" onclick="insMob('La')">La</div>
      <div class="mb-btn btn-root" onclick="insMob('Si')">Si</div>
    </div>
    <div class="mb-row">
      <div class="mb-btn btn-mod" onclick="modMob('#')">#</div>
      <div class="mb-btn btn-mod" onclick="modMob('b')">b</div>
      <div class="mb-btn btn-mod" onclick="modMob('m')">m</div>
      <div class="mb-btn btn-mod" onclick="modMob('7')">7</div>
      <div class="mb-btn btn-action" style="color:var(--danger);" onclick="delMob()">⌫</div>
    </div>
  </div>

  <div id="busy-overlay">
    <div class="glass" style="padding:30px; border-radius:20px; text-align:center">
      <div style="border:3px solid var(--primary); border-top-color:transparent; width:30px; height:30px; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 15px"></div>
      <b id="busy-text">Cargando...</b>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/render.js"></script> 
  <script src="js/editor.js"></script>
</body>
</html>
