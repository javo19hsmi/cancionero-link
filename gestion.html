<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Maestro - Gestión Cancionero</title>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  
  <style>
    :root {
      --primary: #4DB6AC;
      --primary-dark: #004D40;
      --bg: #0A0A0B;
      --card-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text: #E0E0E0;
      --danger: #ff5252;
      --warning: #ffa726;
    }

    body {
      margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    .glass { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); }

    #login-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 10000;
    }
    .login-card { text-align: center; padding: 40px; border-radius: 30px; max-width: 400px; width: 90%; }

    .app-container { display: none; flex-direction: column; height: 100vh; }
    
    header {
      padding: 12px 30px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.4);
    }

    .tabs { display: flex; gap: 30px; padding: 0 30px; background: rgba(255,255,255,0.02); }
    .tab-btn {
      background: none; border: none; color: #777; cursor: pointer;
      font-weight: bold; font-size: 13px; padding: 15px 0;
      border-bottom: 3px solid transparent; transition: 0.3s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .main-grid {
      display: grid; grid-template-columns: 280px 1fr 380px; gap: 20px;
      padding: 20px; flex: 1; overflow: hidden;
    }

    .search-panel { display: flex; flex-direction: column; gap: 15px; height: 100%; overflow: hidden; }
    #song-search { 
      background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 12px; color: white; outline: none; font-size: 14px;
    }
    .song-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 5px; }
    .result-item {
      padding: 10px 15px; border-radius: 10px; cursor: pointer;
      font-size: 13px; transition: 0.2s; border: 1px solid transparent;
    }
    .result-item:hover { background: rgba(255,255,255,0.05); border-color: var(--primary); }
    .result-item.active { background: var(--primary); color: white; }

    .editor-panel { display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
    textarea {
      width: 100%; flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 20px; color: #fff; font-family: 'Consolas', monospace;
      font-size: 16px; line-height: 1.6; resize: none; outline: none;
    }
    textarea:focus { border-color: var(--primary); }

    .preview-panel { height: 100%; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
    .preview-box {
      flex: 1; background: #fff; color: #222; border-radius: 20px; padding: 25px;
      overflow-y: auto; font-family: monospace; line-height: 2.2; font-size: 15px;
    }
    .chordchip { color: var(--primary-dark); font-weight: bold; background: #E0F2F1; padding: 2px 5px; border-radius: 4px; margin-right: 2px; }

    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 10px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
    input, select {
      background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
      border-radius: 8px; padding: 8px 12px; color: white; font-size: 13px; outline: none;
    }

    .chord-kbd { 
      background: rgba(0,0,0,0.4); padding: 15px; border-radius: 16px;
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;
    }
    .k-btn { 
      background: var(--glass); border: 1px solid var(--glass-border);
      color: white; padding: 8px 2px; border-radius: 6px; cursor: pointer; font-size: 11px; text-align: center;
    }
    .k-btn:hover { background: var(--primary); }

    .btn { border: none; border-radius: 12px; padding: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-save { background: var(--primary); color: white; }
    .btn-publish { background: var(--warning); color: white; margin-top: auto; }
    
    #busy-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center; z-index: 20000;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div id="login-overlay">
    <div class="login-card glass">
      <img src="https://javo19hsmi.github.io/cancionero-link/assets/images/Logo_Ministerio_Musica.png" height="100" style="margin-bottom:20px" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2662/2662361.png'">
      <h2 style="margin:0">Portal Maestro</h2>
      <p style="color:#666; font-size:13px">Gestión Parroquial Unificada</p>
      <br><br>
      <button class="btn btn-save" id="login-btn-action" style="width:100%; display:flex; align-items:center; justify-content:center; gap:10px">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
        Entrar con Google
      </button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="app-container">
    <header>
      <div style="display:flex; align-items:center; gap:12px">
        <span class="material-symbols-outlined" style="color:var(--primary)">verified_user</span>
        <div style="line-height:1">
          <b style="font-size:14px; letter-spacing:1px">CANCIONERO MAESTRO</b><br>
          <small id="app-version" style="color:var(--primary); font-size:10px">VERSIÓN: -</small>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:15px">
        <span id="user-display-email" style="font-size:11px; color:#666"></span>
        <button class="btn" id="logout-btn-action" style="padding:5px 15px; font-size:10px; background:var(--glass)">SALIR</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active">🎵 CANCIONERO</button>
      <button class="tab-btn" disabled>📢 ANUNCIOS (Pronto)</button>
      <button class="tab-btn" disabled>📜 GUIONES / ORACIONES (Pronto)</button>
    </div>

    <main class="main-grid">
      <!-- PANEL LISTADO -->
      <section class="search-panel">
        <div class="form-group">
          <label>BUSCAR CANCIÓN</label>
          <input type="text" id="song-search" placeholder="Título o letra...">
        </div>
        <div id="song-results-list" class="song-results"></div>
        <button class="btn btn-publish" id="publish-btn-action">SUBIR VERSIÓN (PÚBLICO) 🚀</button>
      </section>

      <!-- PANEL EDITOR -->
      <section class="editor-panel">
        <div class="glass" style="padding:15px; border-radius:20px; flex:1; display:flex; flex-direction:column; gap:10px">
          <label id="editor-status-label">LETRA (BLINDADA)</label>
          <textarea id="lyrics-editor-box" spellcheck="false" placeholder="Seleccioná una canción de la izquierda..."></textarea>
          
          <div class="chord-kbd" id="chord-keyboard-container"></div>
          <button class="btn" id="delete-chord-btn-action" style="width:100%; background:rgba(255,0,0,0.1); color:var(--danger); font-size:10px; border:1px solid rgba(255,0,0,0.2)">BORRAR ACORDE SELECCIONADO (Alt+Bksp)</button>
        </div>
      </section>

      <!-- PANEL METADATOS -->
      <section class="preview-panel">
        <div class="glass" style="padding:15px; border-radius:20px">
          <div class="meta-grid">
            <div class="form-group">
              <label>TÍTULO</label>
              <input type="text" id="meta-title" readonly>
            </div>
            <div class="form-group">
              <label>TONO BASE</label>
              <select id="meta-key"></select>
            </div>
            <div class="form-group">
              <label>AUTOR</label>
              <input type="text" id="meta-artist">
            </div>
            <div class="form-group">
              <label>RITMO</label>
              <input type="text" id="meta-rhythm">
            </div>
          </div>
          <div class="form-group" style="margin-top:10px">
            <label>AUDIO LINK (MP3 / DRIVE)</label>
            <input type="text" id="meta-audio">
          </div>
          <button class="btn btn-save" id="save-draft-btn-action" style="width:100%; margin-top:15px">GUARDAR BORRADOR 💾</button>
        </div>

        <div style="flex:1; display:flex; flex-direction:column; overflow:hidden">
           <label style="margin-bottom:5px">VISTA PREVIA REAL</label>
           <div id="lyrics-preview-box" class="preview-box"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- BUSY OVERLAY -->
  <div id="busy-overlay">
    <div class="glass" style="padding:30px; border-radius:20px; text-align:center">
      <div style="border:3px solid var(--primary); border-top-color:transparent; width:30px; height:30px; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 15px"></div>
      <b id="busy-text-msg" style="font-size:14px">Cargando...</b>
    </div>
  </div>

  <script>
    // --- 🔐 FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyBYAV2LTgrNQnE3-5wafXQy7H7dj7oyWtI",
      authDomain: "cancionero-parroquial-269d0.firebaseapp.com",
      databaseURL: "https://cancionero-parroquial-269d0-default-rtdb.firebaseio.com",
      projectId: "cancionero-parroquial-269d0",
      storageBucket: "cancionero-parroquial-269d0.firebasestorage.app",
      messagingSenderId: "485257131926",
      appId: "1:485257131926:web:fb24321bad9f8dd2f00fb7",
      measurementId: "G-QJWX3YXJ9S"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let allSongs = [];
    let currentSongData = null;
    let lastUsedChord = "Do";
    let currentUserRole = 'fiel';
    let currentGlobalVer = "0";

    const keys = ["Do","Dom","Do#","Do#m","Re","Rem","Mi","Mim","Fa","Fam","Fa#","Fa#m","Sol","Solm","La","Lam","Si","Sim"];
    const chordMap = {"Do":"C","Re":"D","Mi":"E","Fa":"F","Sol":"G","La":"A","Si":"B"};

    // --- AUTH LOGIC ---
    const triggerLogin = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    const triggerLogout = () => auth.signOut();

    document.getElementById('login-btn-action').onclick = triggerLogin;
    document.getElementById('logout-btn-action').onclick = triggerLogout;

    auth.onAuthStateChanged(async user => {
      if (user) {
        showBusy(true, "Validando permisos...");
        const emailKey = user.email.replace(/\./g, '_');
        const snap = await db.ref(`usuarios/${emailKey}`).get();
        
        if (snap.exists()) {
          const data = snap.val();
          currentUserRole = data.rol || 'fiel';
          const isAllowed = data.es_editor_global || currentUserRole === 'super_admin' || currentUserRole === 'admin_local';

          if (isAllowed) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('user-display-email').innerText = user.email;
            startPortal();
          } else {
            alert("⚠️ Acceso denegado.");
            auth.signOut();
          }
        } else {
          alert("⚠️ Usuario no registrado.");
          auth.signOut();
        }
        showBusy(false);
      } else {
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
      }
    });

    // --- PORTAL INIT ---
    function startPortal() {
      const keySelect = document.getElementById('meta-key');
      keySelect.innerHTML = '<option value="">Sin tono</option>';
      keys.forEach(k => {
        let val = chordMap[k.replace('m','')] + (k.includes('m')?'m':'');
        keySelect.appendChild(new Option(k, val));
      });

      const kbd = document.getElementById('chord-keyboard-container');
      kbd.innerHTML = "";
      ["Do","Re","Mi","Fa","Sol","La","Si","#","b","m","7","📋","◀","▶"].forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'k-btn'; btn.innerText = item;
        btn.onclick = () => {
          if (["Do","Re","Mi","Fa","Sol","La","Si"].includes(item)) handleInsChord(item);
          else if (item === "📋") handleInsChord(lastUsedChord);
          else if (item === "◀") handleNavChord(-1);
          else if (item === "▶") handleNavChord(1);
          else handleModChord(item);
        };
        kbd.appendChild(btn);
      });

      db.ref('version').on('value', s => {
        currentGlobalVer = String(s.val() || "0");
        document.getElementById('app-version').innerText = "VERSIÓN PÚBLICA: v" + currentGlobalVer;
      });

      db.ref('canciones_borrador').on('value', s => {
        if (s.exists()) {
          allSongs = Object.values(s.val()).sort((a,b) => a.title.localeCompare(b.title));
          runFilter();
        }
      });

      attachListeners();
    }

    function runFilter() {
      const query = document.getElementById('song-search').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      const container = document.getElementById('song-results-list');
      container.innerHTML = "";

      allSongs.filter(s => {
        const title = s.title.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const lyrics = s.lyrics.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        return title.includes(query) || lyrics.includes(query);
      }).slice(0, 40).forEach(s => {
        const div = document.createElement('div');
        div.className = `result-item glass ${currentSongData && currentSongData.id === s.id ? 'active' : ''}`;
        div.innerText = s.title;
        div.onclick = () => loadSelectedSong(s);
        container.appendChild(div);
      });
    }

    function loadSelectedSong(song) {
      currentSongData = JSON.parse(JSON.stringify(song));
      document.getElementById('meta-title').value = song.title;
      document.getElementById('meta-artist').value = song.artist || "";
      document.getElementById('meta-key').value = song.key || "";
      document.getElementById('meta-rhythm').value = song.rhythm || "";
      document.getElementById('meta-audio').value = song.link || "";
      document.getElementById('lyrics-editor-box').value = convertUsToEs(song.lyrics);
      
      const isMaster = (currentUserRole === 'super_admin');
      document.getElementById('lyrics-editor-box').readOnly = !isMaster;
      document.getElementById('editor-status-label').innerText = isMaster ? "LETRA (MODO MAESTRO)" : "LETRA (MODO ACORDES)";
      
      refreshPreview();
      runFilter();
    }

    function attachListeners() {
      const area = document.getElementById('lyrics-editor-box');
      area.onkeydown = (e) => {
        if (currentUserRole !== 'super_admin' && !e.altKey && !["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Home","End","PageUp","PageDown"].includes(e.key)) {
           if (!e.ctrlKey) e.preventDefault();
        }
        const keys = {"d":"Do","r":"Re","m":"Mi","f":"Fa","s":"Sol","l":"La","i":"Si"};
        const key = e.key.toLowerCase();
        if (e.altKey && keys[key]) { e.preventDefault(); handleInsChord(keys[key]); }
        if (e.altKey && e.key === "Backspace") { e.preventDefault(); handleDeleteChord(); }
      };
      area.oninput = refreshPreview;
      document.getElementById('song-search').oninput = runFilter;
      document.getElementById('save-draft-btn-action').onclick = executeSaveDraft;
      document.getElementById('publish-btn-action').onclick = executePublish;
      document.getElementById('delete-chord-btn-action').onclick = handleDeleteChord;
    }

    function handleInsChord(token) {
      const ta = document.getElementById('lyrics-editor-box');
      const start = ta.selectionStart;
      const chord = `[${token}]`;
      ta.value = ta.value.slice(0, start) + chord + ta.value.slice(ta.selectionEnd);
      ta.selectionStart = start; ta.selectionEnd = start + chord.length;
      lastUsedChord = token;
      refreshPreview(); ta.focus();
    }

    function handleModChord(mod) {
      const ta = document.getElementById('lyrics-editor-box');
      const txt = ta.value;
      const start = ta.selectionStart;
      const open = txt.lastIndexOf('[', start);
      const close = txt.indexOf(']', start);
      if (open !== -1 && close !== -1 && open < start && close >= start-1) {
        let chord = txt.slice(open + 1, close);
        if (mod === 'm') chord = chord.includes('m') ? chord.replace('m','') : chord + 'm';
        else if (mod === '7') chord = chord.includes('7') ? chord.replace('7','') : chord + '7';
        else if (mod === '#') chord = chord.includes('#') ? chord.replace('#','') : chord.replace('b','') + '#';
        else if (mod === 'b') chord = chord.includes('b') ? chord.replace('b','') : chord.replace('#','') + 'b';
        ta.value = txt.slice(0, open + 1) + chord + txt.slice(close);
        ta.selectionStart = open; ta.selectionEnd = open + chord.length + 2;
        refreshPreview();
      }
      ta.focus();
    }

    function handleNavChord(dir) {
      const ta = document.getElementById('lyrics-editor-box');
      const pos = dir > 0 ? ta.selectionEnd : ta.selectionStart - 1;
      const next = dir > 0 ? ta.value.indexOf('[', pos) : ta.value.lastIndexOf('[', pos);
      if (next !== -1) {
        const end = ta.value.indexOf(']', next);
        ta.selectionStart = next; ta.selectionEnd = end + 1;
      }
      ta.focus();
    }

    function handleDeleteChord() {
      const ta = document.getElementById('lyrics-editor-box');
      const text = ta.value;
      const open = text.lastIndexOf('[', ta.selectionStart);
      const close = text.indexOf(']', ta.selectionStart);
      if (open !== -1 && close !== -1 && open < ta.selectionStart && close >= ta.selectionStart-1) {
        ta.value = text.slice(0, open) + text.slice(close + 1);
        ta.selectionStart = ta.selectionEnd = open;
        refreshPreview();
      }
      ta.focus();
    }

    async function executeSaveDraft() {
      if (!currentSongData) return alert("Elegí una canción.");
      showBusy(true, "Guardando...");
      const update = {
        ...currentSongData,
        lyrics: convertEsToUs(document.getElementById('lyrics-editor-box').value),
        artist: document.getElementById('meta-artist').value,
        key: document.getElementById('meta-key').value,
        rhythm: document.getElementById('meta-rhythm').value,
        link: document.getElementById('meta-audio').value
      };
      try {
        await db.ref(`canciones_borrador/${currentSongData.id}`).update(update);
        await logAudit("EDICIÓN WEB", `Borrador: ${currentSongData.title}`);
        alert("✅ Guardado.");
      } catch (e) { alert("❌ Error: " + e.message); }
      showBusy(false);
    }

    async function executePublish() {
      if (!confirm("🚀 ¿Publicar Versión Oficial?")) return;
      showBusy(true, "Publicando...");
      try {
        const snap = await db.ref('canciones_borrador').get();
        let parts = currentGlobalVer.split('.');
        if (parts.length < 2) parts = [currentGlobalVer, "000"];
        const nextVer = parts[0] + "." + String(parseInt(parts[parts.length - 1]) + 1).padStart(3, '0');
        const pubSnap = await db.ref('canciones_base').get();
        await db.ref(`backups/v${currentGlobalVer.replace(/\./g,'_')}`).set({ timestamp: firebase.database.ServerValue.timestamp, songs: pubSnap.val() });
        await db.ref('canciones_base').set(snap.val());
        await db.ref('version').set(nextVer);
        await logAudit("PUBLICACIÓN WEB", `Versión: v${nextVer}`);
        alert(`🎉 ¡ÉXITO! v${nextVer}`);
      } catch (e) { alert("❌ Error: " + e.message); }
      showBusy(false);
    }

    async function logAudit(accion, detalle) {
      const user = auth.currentUser;
      const log = { timestamp: firebase.database.ServerValue.timestamp, usuario_email: user.email, usuario_nombre: user.displayName, accion, detalle, comunidad_id: 'global' };
      await db.ref('auditoria').push().set(log);
    }

    function refreshPreview() {
      const raw = document.getElementById('lyrics-editor-box').value;
      const fmt = raw.replace(/\{([\s\S]*?)\}/g, '<span style="color:#888; font-style:italic">$1</span>')
                     .replace(/\*\*_([\s\S]*?)_\*\*/g, '<b><i>$1</i></b>').replace(/\*\*([\s\S]*?)\*\*/g, '<b>$1</b>')
                     .replace(/_([\s\S]*?)_/g, '<i>$1</i>').replace(/\[([^\]]+)\]/g, '<span class="chordchip">$1</span>');
      document.getElementById('lyrics-preview-box').innerHTML = fmt.replace(/\n/g, '<br>');
    }

    function convertUsToEs(t) { return t.replace(/\[([^\]]+)\]/g, (m, c) => { const r = c.match(/^([A-G])([#b]?)(.*)/); if (!r) return m; return `[${{"C":"Do","D":"Re","E":"Mi","F":"Fa","G":"Sol","A":"La","B":"Si"}[r[1]]}${r[2]}${r[3]}]`; }); }
    function convertEsToUs(t) { const roots = ["Sol", "Do", "Re", "Mi", "Fa", "La", "Si"]; return t.replace(/\[([^\]]+)\]/g, (m, c) => { for (let r of roots) { if (c.startsWith(r)) { let acc = "", rest = c.slice(r.length); if (rest.startsWith("#") || rest.startsWith("b")) { acc = rest[0]; rest = rest.slice(1); } return `[${{"Do":"C","Re":"D","Mi":"E","Fa":"F","Sol":"G","La":"A","Si":"B"}[r]}${acc}${rest}]`; } } return m; }); }
    function showBusy(on, text) { document.getElementById('busy-overlay').style.display = on ? 'flex' : 'none'; if (text) document.getElementById('busy-text-msg').innerText = text; }
  </script>
</body>
</html>
