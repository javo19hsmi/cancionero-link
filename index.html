<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancionero Parroquial</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <style>
    :root { --primary: #00695C; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
    body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; text-align: center; justify-content: center; }
    .container { padding: 20px; max-width: 600px; width: 90%; margin: auto; }
    .status-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .zoom-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; align-items: center; }
    .zoom-btn { background: #333; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
    .lyrics-view { text-align: left; white-space: pre-wrap; line-height: 1.6; font-size: 1.2rem; }
    .lyrics-view b { color: #ffffff; font-weight: 800; }
    .lyrics-view i { color: #b2dfdb; font-style: italic; }
    .btn-download { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #333; color: #4DB6AC; text-decoration: none; border-radius: 30px; font-weight: bold; border: 1px solid #444; }
  </style>
</head>
<body>
  <div id="portal" class="container">
    <div id="loader" class="status-card">
      <h1>Cargando...</h1>
      <p>Intentando abrir la App.</p>
    </div>
    <div id="main-view" style="display:none;">
      <h1 id="comm-name">Parroquia</h1>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(-1)">A-</button>
        <span>Tamaño</span>
        <button class="zoom-btn" onclick="changeZoom(1)">A+</button>
      </div>
      <div class="status-card">
        <div id="waiting-msg"><h2>En Vivo</h2><p id="status-text">Esperando señal...</p></div>
        <div id="lyrics-display" class="lyrics-view"></div>
      </div>
    </div>
    <a href="https://drive.google.com/file/d/1Ueg7P2rlZxYpF8E_CJ3qn0_KLJE3ru9c/view?usp=drive_link" class="btn-download">Descargar App</a>
  </div>
  <script>
    const FALLBACK = "https://drive.google.com/file/d/1Ueg7P2rlZxYpF8E_CJ3qn0_KLJE3ru9c/view?usp=drive_link";
    const SCHEME = "cancionero-pst";
    const config = { databaseURL: "https://cancionero-parroquial-269d0-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    const hash = decodeURIComponent(window.location.hash.substring(1));
    if (hash) {
      window.location.replace(hash.includes('://') ? hash : `${SCHEME}://${hash}`);
      setTimeout(() => {
        const p = new URLSearchParams(hash.includes('?') ? hash.split('?')[1] : '');
        const path = p.get('path') || (p.get('id') ? `comunidades/${p.get('id')}` : null);
        if (path || hash.includes('vivo')) start(path);
        else window.location.replace(FALLBACK);
      }, 1500);
    } else window.location.replace(FALLBACK);

    function start(path) {
      document.getElementById('loader').style.display='none';
      document.getElementById('main-view').style.display='block';
      db.ref(path).on('value', s => {
        const d = s.val(); if (!d) return;
        document.getElementById('comm-name').innerText = d.nombre || "Comunidad";
        const lyricsDiv = document.getElementById('lyrics-display');
        const waitingDiv = document.getElementById('waiting-msg');
        if (!d.estado_vivo) { waitingDiv.style.display='block'; lyricsDiv.style.display='none'; return; }
        if (d.cancion_actual) {
          db.ref(`canciones_base/${d.cancion_actual}`).once('value', cs => {
            if (cs.exists()) { waitingDiv.style.display='none'; lyricsDiv.style.display='block'; 
              lyricsDiv.innerHTML = cs.val().lyrics.replace(/\[.*?\]/g, "").replace(/\*\*_([\s\S]*?)_\*\*/g, "<b><i>$1</i></b>").replace(/\*\*([\s\S]*?)\*\*/g, "<b>$1</b>").replace(/_([\s\S]*?)_/g, "<i>$1</i>");
            }
          });
        }
      });
    }
    let zoom = 1.2;
    function changeZoom(v) { zoom = Math.min(Math.max(zoom + (v*0.1), 0.8), 3); document.getElementById('lyrics-display').style.fontSize = zoom+'rem'; }
  </script>
</body>
</html>
