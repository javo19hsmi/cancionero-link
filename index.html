<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancionero Parroquial</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <style>
    :root { 
      --primary: #00695C; 
      --primary-light: #4DB6AC;
      --bg: #121212; 
      --card: #1A1A1A; 
      --surface: #222222;
      --text: #E0E0E0; 
      --live-red: #ff5252;
    }
    body { 
      font-family: sans-serif; background-color: var(--bg); color: var(--text); 
      margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
    }
    .container { padding: 16px; max-width: 500px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
    .header-area { text-align: center; margin-top: 10px; }
    .header-area h1 { font-size: 1.4rem; color: var(--primary-light); margin: 0; text-transform: uppercase; }
    .live-badge { font-size: 0.85rem; color: #888; font-weight: bold; margin-top: 5px; transition: color 0.3s; }
    .live-badge.active { color: var(--live-red); }
    .status-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #2C2C2C; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
    .zoom-controls { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 8px 16px; border-radius: 12px; margin-bottom: 16px; }
    .zoom-btn { background: #2E2E2E; color: white; border: 1px solid #444; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
    .lyrics-view { text-align: left; line-height: 1.7; font-size: 1.25rem; padding: 10px 4px; }
    
    .bloque { padding: 12px; border-radius: 8px; margin-bottom: 8px; transition: all 0.3s ease; border-left: 4px solid transparent; white-space: pre-wrap; }
    .bloque.active { background: rgba(77, 182, 172, 0.15); border-left-color: var(--primary-light); color: #ffffff; transform: translateX(5px); }
    .bloque b { color: var(--primary-light); font-weight: 700; }
    
    .btn-download { display: flex; justify-content: center; padding: 14px; background-color: var(--primary); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="portal" class="container">
    <div id="loader" class="status-card" style="text-align:center; padding:60px 20px;">
      <h2>Cargando portal...</h2>
      <p style="color: #888;">Intentando abrir la App...</p>
    </div>
    <div id="main-view" style="display:none;">
      <div class="header-area">
        <h1 id="comm-name">Parroquia</h1>
        <div id="live-indicator" class="live-badge">● TRANSMISIÓN INACTIVA</div>
      </div>
      <br>
      <div class="status-card">
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="changeZoom(-1)">A-</button>
          <span style="color:#A0A0A0; font-size:0.9rem;">Tamaño</span>
          <button class="zoom-btn" onclick="changeZoom(1)">A+</button>
        </div>
        <div id="waiting-msg" style="text-align:center; padding:40px 20px;">
          <h2 id="waiting-title" style="color:var(--primary-light)">Conectado 💒</h2>
          <p id="status-text" style="color: #888;">Esperando la celebración 🕒</p>
        </div>
        <div id="lyrics-display" class="lyrics-view" style="display:none;"></div>
      </div>
    </div>
    <a href="https://drive.google.com/file/d/1Ueg7P2rlZxYpF8E_CJ3qn0_KLJE3ru9c/view?usp=drive_link" class="btn-download">📥 Descargar Aplicación Móvil</a>
  </div>

  <script>
    const SCHEME = "cancionero-pst";
    const FALLBACK = "https://drive.google.com/file/d/1Ueg7P2rlZxYpF8E_CJ3qn0_KLJE3ru9c/view?usp=drive_link";
    
    firebase.initializeApp({ databaseURL: "https://cancionero-parroquial-269d0-default-rtdb.firebaseio.com/" });
    const db = firebase.database();

    const hash = decodeURIComponent(window.location.hash.substring(1));
    if (hash) {
      window.location.replace(hash.includes('://') ? hash : `${SCHEME}://${hash}`);
      setTimeout(() => {
        const p = new URLSearchParams(hash.includes('?') ? hash.split('?')[1] : '');
        const path = p.get('path') || (p.get('id') ? `comunidades/${p.get('id')}` : null);
        if (path) start(path); else window.location.replace(FALLBACK);
      }, 1500);
    } else window.location.replace(FALLBACK);

    function start(path) {
      document.getElementById('loader').style.display='none';
      document.getElementById('main-view').style.display='block';
      
      db.ref(path).on('value', s => {
        const d = s.val(); if (!d) return;
        document.getElementById('comm-name').innerText = d.nombre || "Comunidad";
        const lyricsDiv = document.getElementById('lyrics-display');
        const waitingDiv = document.getElementById('waiting-msg');
        const liveInd = document.getElementById('live-indicator');
        const waitTitle = document.getElementById('waiting-title');
        const statusText = document.getElementById('status-text');
        const blockIdx = parseInt(d.bloque_actual) || -1;
        
        if (!d.estado_vivo) { 
          liveInd.classList.remove('active'); liveInd.innerText = "● TRANSMISIÓN INACTIVA";
          waitingDiv.style.display='block'; lyricsDiv.style.display='none'; 
          waitTitle.innerText = "Te esperamos en la proxima celebración ⛪";
          statusText.innerText = "Próximamente en vivo o transmisión finalizada ⏳";
          return; 
        }

        liveInd.classList.add('active'); liveInd.innerText = "● TRANSMISIÓN EN VIVO";
        
        if (d.cancion_actual) {
          db.ref(`canciones_base/${d.cancion_actual}`).once('value', cs => {
            if (cs.exists()) mostrarContenido(cs.val().lyrics, -1, waitingDiv, lyricsDiv);
          });
        } else if (d.oracion_actual) {
          db.ref(`oraciones_oficiales/${d.oracion_actual}`).once('value', so => {
            if (so.exists()) mostrarContenido(so.val(), blockIdx, waitingDiv, lyricsDiv);
            else db.ref(`${path}/oraciones/${d.oracion_actual}`).once('value', sl => {
              if (sl.exists()) mostrarContenido(sl.val(), blockIdx, waitingDiv, lyricsDiv);
            });
          });
        } else {
          waitingDiv.style.display='block'; lyricsDiv.style.display='none';
          waitTitle.innerText = "Cantemos Juntos 🎶";
          statusText.innerText = "🗣️ En breve iniciará el siguiente canto.";
        }
      });
    }

    function mostrarContenido(data, blockIdx, waitingDiv, lyricsDiv) {
      waitingDiv.style.display='none'; lyricsDiv.style.display='block'; 
      let html = "";
      if (typeof data === 'string') {
        html = `<div class="bloque">${darFormato(data)}</div>`;
      } else {
        const bloques = data.contenido || [];
        html = bloques.map((b, i) => {
          const activeClass = (i === blockIdx) ? 'active' : '';
          let txt = b.texto || "";
          if (b.tipo === 'versiculo') txt = `<b>V.</b> ${txt}`;
          if (b.tipo === 'respuesta') txt = `<b>R.</b> ${txt}`;
          if (b.tipo === 'titulo_seccion') txt = `<b style="color:var(--primary-light)">${txt}</b>`;
          return `<div class="bloque ${activeClass}">${darFormato(txt)}</div>`;
        }).join('');
      }
      lyricsDiv.innerHTML = html;
      const activeEl = document.querySelector('.bloque.active');
      if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function darFormato(t) { return t.replace(/\[.*?\]/g, "").replace(/\*\*_([\s\S]*?)_\*\*/g, "<i><b>$1</b></i>").replace(/\*\*([\s\S]*?)\*\*/g, "<b>$1</b>").replace(/_([\s\S]*?)_/g, "<i>$1</i>"); }
    let zoom = 1.25;
    function changeZoom(v) { zoom = Math.min(Math.max(zoom + (v * 0.15), 0.9), 3.0); document.getElementById('lyrics-display').style.fontSize = zoom + 'rem'; }
  </script>
</body>
</html>
