<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misa en Vivo - Cancionero Parroquial</title>
  
  <!-- Firebase App y Database -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    :root { --primary: #00695C; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; text-align: center; }
    .container { padding: 20px; max-width: 600px; width: 90%; margin: auto; }
    h1 { color: #4DB6AC; font-size: 1.4rem; margin-bottom: 5px; }
    .status-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
    
    /* Controles de Zoom */
    .zoom-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; align-items: center; }
    .zoom-btn { background: #333; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .zoom-btn:active { transform: scale(0.9); background: var(--primary); }

    .lyrics-view { text-align: left; white-space: pre-wrap; line-height: 1.6; font-size: 1.2rem; transition: font-size 0.2s; }
    
    /* Estilos para el texto formateado */
    .lyrics-view b { color: #ffffff; font-weight: 800; }
    .lyrics-view i { color: #b2dfdb; font-style: italic; }
    
    .loading-spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4DB6AC; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .btn-download { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #333; color: #4DB6AC; text-decoration: none; border-radius: 30px; font-size: 0.9rem; font-weight: bold; border: 1px solid #444; }
  </style>
</head>
<body>

  <div id="portal" class="container">
    <div id="loader" class="status-card">
      <h1>Conectando...</h1>
      <div class="loading-spinner"></div>
    </div>

    <div id="main-view" style="display:none;">
      <h1 id="comm-name">Parroquia</h1>
      
      <!-- Botones de Zoom -->
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(-2)">A-</button>
        <span id="zoom-label" style="font-size: 0.8rem; color: #888;">Tamaño</span>
        <button class="zoom-btn" onclick="changeZoom(2)">A+</button>
      </div>

      <div id="content-card" class="status-card">
        <div id="waiting-msg">
          <span style="font-size: 40px;">⏳</span>
          <p id="status-text">Esperando contenido...</p>
        </div>
        <div id="lyrics-display" class="lyrics-view"></div>
      </div>

      <a href="https://drive.google.com/file/d/1Ueg7P2rlZxYpF8E_CJ3qn0_KLJE3ru9c/view?usp=drive_link" class="btn-download">
        Descarga la App Completa
      </a>
    </div>
  </div>

  <script>
    // 1. CONFIGURACIÓN
    const firebaseConfig = { databaseURL: "https://cancionero-parroquial-269d0-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentFontSize = 1.2; // rem
    function changeZoom(delta) {
      currentFontSize = Math.min(Math.max(currentFontSize + (delta * 0.1), 0.8), 2.5);
      document.getElementById('lyrics-display').style.fontSize = currentFontSize + 'rem';
    }

    // 2. FORMATEO DE TEXTO (Markdown simple)
    function formatLyrics(text) {
      if (!text) return "";
      let formatted = text
        .replace(/\[.*?\]/g, "") // Quitar acordes
        .replace(/\*\*_([\s\S]*?)_\*\*/g, "<b><i>$1</i></b>") // Negrita Cursiva
        .replace(/\*\*([\s\S]*?)\*\*/g, "<b>$1</b>") // Negrita
        .replace(/_([\s\S]*?)_/g, "<i>$1</i>"); // Cursiva
      return formatted;
    }

    // 3. LÓGICA DE INICIO
    const hash = window.location.hash.substring(1);
    if (hash && hash.includes("id=")) {
      const commId = hash.split("id=")[1];
      startWebListener(commId);
    } else {
      window.location.replace("https://drive.google.com/file/d/1Ueg7P2rlZxYpF8E_CJ3qn0_KLJE3ru9c/view?usp=drive_link");
    }

    function startWebListener(commId) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('main-view').style.display = 'block';

      db.ref(`comunidades/${commId}`).on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        document.getElementById('comm-name').innerText = data.nombre || "Comunidad";
        const lyricsDiv = document.getElementById('lyrics-display');
        const waitingDiv = document.getElementById('waiting-msg');
        const statusText = document.getElementById('status-text');

        if (data.estado_vivo !== true) {
          waitingDiv.style.display = 'block'; lyricsDiv.style.display = 'none';
          statusText.innerText = "La transmisión está apagada.";
          return;
        }

        if (data.cancion_actual) {
          db.ref(`canciones_base/${data.cancion_actual}`).once('value', (s) => {
            if (s.exists()) {
              waitingDiv.style.display = 'none'; lyricsDiv.style.display = 'block';
              lyricsDiv.innerHTML = formatLyrics(s.val().lyrics);
            }
          });
        } else if (data.oracion_actual) {
          db.ref(`oraciones_oficiales/${data.oracion_actual}`).once('value', (o) => {
            if (o.exists()) {
              let ora = o.val();
              waitingDiv.style.display = 'none'; lyricsDiv.style.display = 'block';
              let rawText = ora.contenido ? ora.contenido.map(b => b.texto).join('\n\n') : (ora.texto || "");
              lyricsDiv.innerHTML = formatLyrics(rawText);
            }
          });
        } else {
          waitingDiv.style.display = 'block'; lyricsDiv.style.display = 'none';
          statusText.innerText = "Esperando la próxima canción u oración...";
        }
      });
    }
  </script>
</body>
</html>
